name: Verify action inputs handling
on:
  workflow_dispatch:
  schedule:
    - cron: '5 3 * * 1'
jobs:
  catch-unsafe-vm-name:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: github.event_name != 'schedule' || github.repository == 'adelton/virt-install'
    strategy:
      fail-fast: false
      matrix:
        vm-name:
          - A
          - $PWD
          - -f
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: https://cloud-images.ubuntu.com/releases/resolute/release/ubuntu-26.04-server-cloudimg-amd64v3.img
          vm-name: ${{ matrix.vm-name }}
        id: virt-install
        continue-on-error: true
      - run: echo '${{ steps.virt-install.outcome }}'
      - name: Check that the action caught the inputs.vm-name
        if: steps.virt-install.outcome == 'failure'
        run: true
      - name: Fail if the action did not catch the inputs.vm-name
        if: steps.virt-install.outcome == 'success'
        run: false
