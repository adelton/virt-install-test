name: Retrieve possible osinfo values
on:
  workflow_dispatch:
  schedule:
    - cron: '6 3 * * 1'
jobs:
  osinfo-to-md:
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - ubuntu-26.04
          - ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name != 'schedule' || github.repository == 'adelton/virt-install'
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt update
      - run: sudo apt install osinfo-db xsltproc
      - run: . /etc/os-release && echo "UBUNTU_VERSION=$VERSION_ID" >> $GITHUB_ENV
      - run: util/osinfo-to-md.sh > docs/osinfo-ubuntu-$UBUNTU_VERSION.md
      - run: git diff --exit-code -- docs/osinfo-ubuntu-$UBUNTU_VERSION.md
        id: git-diff
        continue-on-error: true
      - run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@users.noreply.github.com"

          OSINFO_DB_VERSION=$( dpkg-query -W -f '${Version}\n' osinfo-db )
          DATE=$( date +%F )
          BRANCH="osinfo-update/ubuntu-$UBUNTU_VERSION-$OSINFO_DB_VERSION-$DATE"
          git checkout -b "$BRANCH"
          git add docs/osinfo-ubuntu-$UBUNTU_VERSION.md
          COMMIT_MESSAGE="Update osinfo documentation for osinfo-db $OSINFO_DB_VERSION @ Ubuntu $UBUNTU_VERSION on $DATE."
          git commit -m "$COMMIT_MESSAGE"
          git push origin "$BRANCH:$BRANCH"

          echo '{ "head": "'"$BRANCH"'", "base": "master", "title": "'"$COMMIT_MESSAGE"'", "body": "Update the osinfo documentation, capture the up-to-date list of short-ids and/or remove distributions that went EOL." }' \
          | tee /dev/stderr \
          | curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H 'Content-Type: application/json' \
            -d '@-' \
            ${{ github.api_url }}/repos/${{ github.repository }}/pulls
        shell: bash -euxo pipefail {0}
        if: steps.git-diff.outcome == 'failure'
