name: Test virt-install workflow dispatch
on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  test-dispatch:
    name: Dispatch
    runs-on: ubuntu-latest
    permissions:
      actions: write
    timeout-minutes: 1
    steps:
      - run: |
          curl -sS --fail-with-body -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "ref": "${{ github.ref }}",
              "inputs": {
                "disk-url": "https://repo.almalinux.org/almalinux/10.1/cloud/x86_64/images/AlmaLinux-10-GenericCloud-10.1-20251125.0.x86_64.qcow2",
                "osinfo": "almalinux10",
                "command": "cat /etc/os-release"
              }}' \
            ${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows/virt-install.yaml/dispatches
