name: Create virtual machine
on:
  - push
  - workflow_dispatch
jobs:
  test-plan:
    name: Generate test plan
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: github.event_name != 'schedule' || github.repository == 'adelton/virt-install'
    outputs:
      matrix-run: ${{ steps.produce-matrix.outputs.matrix-run }}
      vm-name: ${{ steps.produce-matrix.outputs.vm-name }}
      vm-name-2: ${{ steps.produce-matrix.outputs.vm-name-2 }}
    steps:
      - uses: actions/checkout@v6
      - id: produce-matrix
        run: |
          if [ -n "$INPUT_DISK_URL" ] ; then
              [ "$INPUT_ARCH" == '(guess)' ] && INPUT_ARCH=
              cat <<EOS | tee /dev/stderr | yq . -o json -
                virt-install:
                  name:
                    ${INPUT_DISK_URL##*/}:
                      disk-url: $INPUT_DISK_URL
                      arch: "$INPUT_ARCH"
                      runs-on: $INPUT_RUNS_ON
                      osinfo: $INPUT_OSINFO
                      network: $INPUT_NETWORK
                      args: $INPUT_ARGS
                      virt-customize: $INPUT_VIRT_CUSTOMIZE
          EOS
          else
              yq . -o json .github/virt-install-params.yaml
          fi \
              | tee /dev/stderr \
              | jq -cf ./ci/generate-test-matrix.jq \
              | tee .github/virt-install.json \
              | ( echo -n 'matrix-run=' >> $GITHUB_OUTPUT ; tee -a $GITHUB_OUTPUT )
          jq -sr -f ./ci/test-matrix-to-html.jq < .github/virt-install.json >> $GITHUB_STEP_SUMMARY
          if [ -z "$INPUT_VM_NAME" ] ; then
              INPUT_VM_NAME=machine.example.test
          fi
          echo "vm-name=$INPUT_VM_NAME" >> $GITHUB_OUTPUT
          VM_NAME2="${INPUT_VM_NAME/./-2.}"
          if [ "$INPUT_VM_NAME" == "$VM_NAME2" ] ; then
              VM_NAME2="$INPUT_VM_NAME-2"
          fi
          echo "vm-name-2=$VM_NAME2" >> $GITHUB_OUTPUT
        shell: bash -euxo pipefail {0}
        env:
          INPUT_DISK_URL: ${{ inputs.disk-url }}
          INPUT_ARCH: ${{ inputs.arch }}
          INPUT_RUNS_ON: ${{ inputs.runs-on }}
          INPUT_OSINFO: ${{ inputs.osinfo }}
          INPUT_NETWORK: ${{ inputs.network }}
          INPUT_ARGS: ${{ inputs.args }}
          INPUT_VM_NAME: ${{ inputs.vm-name }}
          INPUT_VIRT_CUSTOMIZE: ${{ inputs.virt-customize }}
  virt-install:
    runs-on: ${{ matrix.runs-on }}
    needs: [ test-plan ]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.test-plan.outputs.matrix-run) }}
    steps:
      - uses: actions/checkout@v6
      - id: run-machine
        uses: adelton/virt-install@master
        with:
          disk-url: ${{ matrix.disk-url }}
          arch: ${{ matrix.arch }}
          vm-name: ${{ needs.test-plan.outputs.vm-name }}
          osinfo: ${{ matrix.osinfo }}
          network: ${{ matrix.network }}
          args: ${{ ( matrix.boot != '' && format('--boot {0} ', matrix.boot) ) || ''}}${{ matrix.args }}
          virt-customize: ${{ matrix.virt-customize }}
      - uses: ./.github/actions/inventory
        with:
          vm-name: ${{ needs.test-plan.outputs.vm-name }}
          compare-dir: ${{ matrix.inventory }}
        if: inputs.disk-url == ''
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: ${{ needs.test-plan.outputs.vm-name }}
          condition: ${{ matrix.secure-boot-check }}
      - run: ssh root@'${{ needs.test-plan.outputs.vm-name }}' "$INPUT_COMMAND"
        if: inputs.command != ''
        env:
          INPUT_COMMAND: ${{ inputs.command }}
      - run: |
          if [ "$INPUT_NETWORK" = './tests/network-192-168-1.xml' ] ; then
            [[ "$IP_ADDRESS" =~ ^192\.168\.1\. ]]
          else
            [[ "$IP_ADDRESS" =~ ^192\.168\.122\. ]]
          fi
        env:
          INPUT_NETWORK: ${{ matrix.network }}
          IP_ADDRESS: ${{ steps.run-machine.outputs.ip-address }}
      - run: |
          diff <( ssh root@'${{ needs.test-plan.outputs.vm-name }}' 'mkdir /mnt/host-dir && mount -t virtiofs host-dir /mnt/host-dir && cat /mnt/host-dir/hostname' ) /etc/hostname
        if: matrix.virtiofs-test == 'test'
      - run: |
          virsh --connect qemu:///session dumpxml '${{ needs.test-plan.outputs.vm-name }}' | xmllint --xpath '/domain/devices/vsock' -
          VSOCK=$( virsh --connect qemu:///session dumpxml '${{ needs.test-plan.outputs.vm-name }}' | xmllint --xpath 'string(/domain/devices/vsock/cid/@address)' - )
          ssh_opts=( -o 'StrictHostKeyChecking accept-new' )
          [ -f /etc/ssh/ssh_config.d/20-systemd-ssh-proxy.conf ] || ssh_opts+=( -o "ProxyCommand=socat - VSOCK-CONNECT:$VSOCK:22" )
          ssh "${ssh_opts[@]}" root@vsock%$VSOCK cat /etc/hostname
        if: matrix.vsock-ssh-test == 'test'

      - run: |
          virsh --connect qemu:///session destroy '${{ needs.test-plan.outputs.vm-name }}'
          virsh --connect qemu:///session undefine --nvram '${{ needs.test-plan.outputs.vm-name }}'
          rm -f ~/.ssh/known_hosts
        if: matrix.second-machine == 'recreate' || matrix.second-machine == 'local-file'
      - uses: adelton/virt-install@master
        with:
          disk-url: ${{ matrix.disk-url }}
          arch: ${{ matrix.arch }}
          vm-name: ${{ needs.test-plan.outputs.vm-name }}
          osinfo: ${{ matrix.osinfo }}
          network: ${{ matrix.network }}
          args: ${{ ( matrix.boot != '' && format('--boot {0} ', matrix.boot) ) || ''}}${{ matrix.args }}
          virt-customize: ${{ matrix.virt-customize }}
        if: matrix.second-machine == 'recreate'
      - id: fetch-image
        run: |
          curl -LO '${{ matrix.disk-url }}'
          BASE_NAME="${DISK_URL##*/}"
          if [[ "$BASE_NAME" =~ .gz$ ]] ; then
            gunzip < "$BASE_NAME" > "${BASE_NAME%.gz}"
            BASE_NAME="${BASE_NAME%.gz}"
          fi
          echo "local-image-file=$BASE_NAME" | tee -a $GITHUB_OUTPUT
        if: matrix.second-machine == 'local-file'
        env:
          DISK_URL: ${{ matrix.disk-url }}
      - uses: adelton/virt-install@master
        with:
          disk-url: file://${{ github.workspace }}/${{ steps.fetch-image.outputs.local-image-file }}
          arch: ${{ matrix.arch }}
          vm-name: ${{ needs.test-plan.outputs.vm-name }}
          osinfo: ${{ matrix.osinfo }}
          network: ${{ matrix.network }}
          args: ${{ ( matrix.boot != '' && format('--boot {0} ', matrix.boot) ) || ''}}${{ matrix.args }}
          virt-customize: ${{ matrix.virt-customize }}
        if: matrix.second-machine == 'local-file'
      - uses: ./.github/actions/inventory
        with:
          vm-name: ${{ needs.test-plan.outputs.vm-name }}
          compare-dir: ${{ matrix.inventory }}
        if: matrix.second-machine == 'recreate' || matrix.second-machine == 'local-file'
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: ${{ needs.test-plan.outputs.vm-name }}
          condition: ${{ matrix.secure-boot-check }}
        if: matrix.second-machine == 'recreate' || matrix.second-machine == 'local-file'

      - id: run-machine-2
        uses: adelton/virt-install@master
        with:
          disk-url: ${{ matrix.disk-url }}
          arch: ${{ matrix.arch }}
          vm-name: ${{ needs.test-plan.outputs.vm-name-2 }}
          osinfo: ${{ matrix.osinfo }}
          network: ${{ matrix.network }}
          args: ${{ ( matrix.boot != '' && format('--boot {0} ', matrix.boot) ) || ''}}${{ matrix.args }}
          virt-customize: ${{ matrix.virt-customize }}
        if: matrix.second-machine == 'multihost'
      - run: |
          ssh root@'${{ needs.test-plan.outputs.vm-name }}' 'ssh-keygen -N "" -f ~/.ssh/id_rsa'
          ssh root@'${{ needs.test-plan.outputs.vm-name }}' 'cat ~/.ssh/id_rsa.pub' | ssh root@'${{ needs.test-plan.outputs.vm-name-2 }}' 'umask 077 && cat > ~/.ssh/authorized_keys'
          ssh root@'${{ needs.test-plan.outputs.vm-name }}' "ssh -o 'StrictHostKeyChecking accept-new' root@'${{ steps.run-machine-2.outputs.ip-address }}' ip a"
        shell: bash -euxo pipefail {0}
        if: matrix.second-machine == 'multihost'
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: ${{ needs.test-plan.outputs.vm-name-2 }}
          condition: ${{ matrix.secure-boot-check }}
        if: matrix.second-machine == 'multihost'
