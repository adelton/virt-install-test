name: Create virtual machine
on:
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      disk-url:
        description: URL of disk to use
      vm-name:
        description: Name of the VM (libvirt domain)
        default: vm1.example.com
      osinfo:
        description: The osinfo parameter to virt-install
        default: generic
      boot:
        description: The virt-install --boot argument value
        default: uefi
      command:
        description: Command to run in the VM

jobs:
  test-plan:
    name: Generate test plan
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      matrix-run: ${{ steps.produce-matrix.outputs.matrix-run }}
    steps:
      - uses: actions/checkout@v6
      - id: produce-matrix
        run: |
          yq . -o json .github/virt-install-params.yaml | jq -cf ./ci/generate-test-matrix.jq \
              | ( echo -n 'matrix-run=' >> $GITHUB_OUTPUT ; tee -a $GITHUB_OUTPUT )
  virt-install:
    runs-on: ${{ matrix.runs-on }}
    if: inputs.disk-url == ''
    needs: [ test-plan ]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.test-plan.outputs.matrix-run) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: ${{ matrix.disk-url }}
          osinfo: ${{ matrix.osinfo }}
          boot: ${{ matrix.boot }}
        if: matrix.boot != ''
      - uses: ./
        with:
          disk-url: ${{ matrix.disk-url }}
          osinfo: ${{ matrix.osinfo }}
        if: matrix.boot == ''
      - uses: ./.github/actions/inventory
        with:
          vm-name: vm1.example.com
          compare-dir: ${{ matrix.inventory }}
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: vm1.example.com
          condition: ${{ matrix.secure-boot-check }}

  virt-install-manual:
    runs-on: ubuntu-latest
    if: inputs.disk-url != ''
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: ${{ inputs.disk-url }}
          vm-name: ${{ inputs.vm-name }}
          osinfo: ${{ inputs.osinfo }}
          boot: ${{ inputs.boot }}
      - run: ssh root@'${{ inputs.vm-name }}' "$INPUT_COMMAND"
        if: inputs.command != ''
        env:
          INPUT_COMMAND: ${{ inputs.command }}
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: ${{ inputs.vm-name }}
          condition:
