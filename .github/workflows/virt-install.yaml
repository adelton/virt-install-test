name: Create virtual machine
on:
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      disk-url:
        description: URL of disk to use
      vm-name:
        description: Name of the VM (libvirt domain)
        default: vm1.example.com
      osinfo:
        description: The osinfo parameter to virt-install
        default: generic
      boot:
        description: The virt-install --boot argument value
        default: uefi
      command:
        description: Command to run in the VM

jobs:
  virt-install-almalinux:
    runs-on: ubuntu-latest
    if: inputs.disk-url == ''
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: https://repo.almalinux.org/almalinux/10.1/cloud/x86_64/images/AlmaLinux-10-GenericCloud-10.1-20251125.0.x86_64.qcow2
          osinfo: almalinux10
          boot: hd
      - uses: ./.github/actions/inventory
        with:
          vm-name: vm1.example.com
          compare-dir: tests/inventory/almalinux-10
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: vm1.example.com
          condition: secure-boot=missing,enrolled-keys=missing
  virt-install-fedora:
    runs-on: ubuntu-latest
    if: inputs.disk-url == ''
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: https://download.fedoraproject.org/pub/fedora/linux/releases/42/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-42-1.1.x86_64.qcow2
          vm-name: fedora-42.example.test
          osinfo: fedora42
          boot: hd
      - uses: ./.github/actions/inventory
        with:
          vm-name: fedora-42.example.test
          compare-dir: tests/inventory/fedora-42
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: fedora-42.example.test
          condition: secure-boot=missing,enrolled-keys=missing
      - run: curl -LO https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2
      - uses: ./
        with:
          disk-url: file://${{ github.workspace }}/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2
          vm-name: fedora-43.example.test
          osinfo: fedora42
          boot: hd
      - uses: ./.github/actions/inventory
        with:
          vm-name: fedora-43.example.test
          compare-dir: tests/inventory/fedora-43
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: fedora-43.example.test
          condition: secure-boot=missing,enrolled-keys=missing
  virt-install-ubuntu:
    runs-on: ubuntu-latest
    if: inputs.disk-url == ''
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img
          vm-name: ubuntu.example.test
          osinfo: ubuntu24.04
          boot: hd
      - run: virsh dumpxml ubuntu.example.test
      - uses: ./.github/actions/inventory
        with:
          vm-name: ubuntu.example.test
          compare-dir: tests/inventory/ubuntu-24.04
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: ubuntu.example.test
          condition: secure-boot=missing,enrolled-keys=missing
  virt-install-arch-linux:
    runs-on: ubuntu-latest
    if: inputs.disk-url == ''
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
          vm-name: arch.example.test
          osinfo: archlinux
          boot: hd
      - run: virsh dumpxml arch.example.test
      - uses: ./.github/actions/inventory
        with:
          vm-name: arch.example.test
          compare-dir: tests/inventory/arch-linux-latest
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: arch.example.test
          condition: secure-boot=missing,enrolled-keys=missing

  virt-install-manual:
    runs-on: ubuntu-latest
    if: inputs.disk-url != ''
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          disk-url: ${{ inputs.disk-url }}
          vm-name: ${{ inputs.vm-name }}
          osinfo: ${{ inputs.osinfo }}
          boot: ${{ inputs.boot }}
      - run: ssh root@'${{ inputs.vm-name }}' "$INPUT_COMMAND"
        if: inputs.command != ''
        env:
          INPUT_COMMAND: ${{ inputs.command }}
      - uses: ./.github/actions/secure-boot-check
        with:
          vm-name: ${{ inputs.vm-name }}
          condition:
