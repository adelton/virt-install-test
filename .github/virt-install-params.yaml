
virt-install:
  disk-url:
    https://repo.almalinux.org/almalinux/10.1/cloud/x86_64/images/AlmaLinux-10-GenericCloud-10.1-20251125.0.x86_64.qcow2 :
      name: AlmaLinux 10
      osinfo: almalinux10
      inventory: tests/inventory/almalinux-10
    https://download.fedoraproject.org/pub/fedora/linux/releases/43/Server/x86_64/images/Fedora-Server-Guest-Generic-43-1.6.x86_64.qcow2 :
      name: Fedora 43 (no cloud-init)
      osinfo: fedora42
      inventory: tests/inventory/fedora-43-server
      virt-customize: >
        --ssh-inject root:file:/home/runner/.ssh/id_rsa.pub
        --firstboot-command 'restorecon -rvv /root/.ssh'
        --link /dev/null:/etc/systemd/system/initial-setup.service
        --no-selinux-relabel
    https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2 :
      name: Fedora 43
      osinfo: fedora42
      inventory: tests/inventory/fedora-43
    https://download.fedoraproject.org/pub/fedora/linux/releases/42/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-42-1.1.x86_64.qcow2 :
      name: Fedora 42
      osinfo: fedora42
      inventory: tests/inventory/fedora-42
    https://cloud-images.ubuntu.com/releases/noble/release-20260321/ubuntu-24.04-server-cloudimg-amd64.img :
      name: Ubuntu 24.04
      osinfo: ubuntu24.04
      inventory: tests/inventory/ubuntu-24.04
    https://cloud.debian.org/images/cloud/trixie/20260316-2418/debian-13-genericcloud-amd64-20260316-2418.qcow2 :
      name: Debian 13
      osinfo: debian13
      inventory: tests/inventory/debian-13
    https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2 :
      name: Arch Linux latest
      osinfo: archlinux
      inventory: tests/inventory/arch-linux-latest
    https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-x86_64-uefi-cloudinit-r0.qcow2 :
      name: Alpine Linux 3.23
      osinfo: alpinelinux3.21
      inventory: tests/inventory/alpine-linux-3.23
      boot: uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no
      secure-boot-check: secure-boot=no,enrolled-keys=no
      virt-customize: >
        --run-command 'sed -i "s/^root:!\\*:/root:*:/" /etc/shadow'

  osinfo: linux2024

  boot:
    uefi:
      secure-boot-check: secure-boot=yes,enrolled-keys=yes
    hd:
      secure-boot-check: secure-boot=missing,enrolled-keys=missing
    uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=yes:
      secure-boot-check: secure-boot=yes,enrolled-keys=yes
    uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
      secure-boot-check: secure-boot=no,enrolled-keys=no

  second-machine:
    - recreate
    - local-file
    - multihost

  exclude:
    - disk-url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
      secure-boot-check: secure-boot=yes,enrolled-keys=yes
    - disk-url: https://cloud.debian.org/images/cloud/trixie/20260316-2418/debian-13-genericcloud-amd64-20260316-2418.qcow2
      boot: hd

