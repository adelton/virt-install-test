
virt-install:
  runs-on:
    - ubuntu-26.04
    - ubuntu-26.04-arm

  name:
    AlmaLinux 10.2:
      osinfo: almalinux10
      arch:
        x86_64:
          disk-url: https://repo.almalinux.org/almalinux/10.2/cloud/x86_64/images/AlmaLinux-10-GenericCloud-10.2-20260526.0.x86_64.qcow2
          inventory: tests/inventory/almalinux-10-x86_64
        aarch64:
          disk-url: https://repo.almalinux.org/almalinux/10.2/cloud/aarch64/images/AlmaLinux-10-GenericCloud-10.2-20260526.0.aarch64.qcow2
          inventory: tests/inventory/almalinux-10-aarch64
          boot: &boot-no-secure-boot
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
              secure-boot-check: secure-boot=no
    Fedora 44 (no cloud-init):
      osinfo: fedora42
      arch:
        x86_64:
          disk-url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Server/x86_64/images/Fedora-Server-Guest-Generic-44-1.7.x86_64.qcow2
          inventory: tests/inventory/fedora-44-server-x86_64
          runs-on:
            ubuntu-26.04:
            ubuntu-26.04-arm:
              virt-customize: >
                --ssh-inject root:file:/home/runner/.ssh/id_rsa.pub
                --firstboot-command 'restorecon -rvv /root/.ssh'
                --link /dev/null:/etc/systemd/system/initial-setup.service
                --mkdir /etc/systemd/system.conf.d
                --copy-in tests/systemd-device-timeout.conf:/etc/systemd/system.conf.d
                --no-selinux-relabel
      virt-customize: >
        --ssh-inject root:file:/home/runner/.ssh/id_rsa.pub
        --firstboot-command 'restorecon -rvv /root/.ssh'
        --link /dev/null:/etc/systemd/system/initial-setup.service
        --no-selinux-relabel
      vsock-ssh-test: no
    Fedora 44:
      osinfo: fedora42
      arch:
        x86_64:
          disk-url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2
          inventory: tests/inventory/fedora-44-x86_64
          runs-on:
            ubuntu-26.04:
            ubuntu-26.04-arm:
              virt-customize: &systemd-device-timeout >
                --mkdir /etc/systemd/system.conf.d
                --copy-in tests/systemd-device-timeout.conf:/etc/systemd/system.conf.d
                --no-selinux-relabel
        aarch64:
          disk-url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/aarch64/images/Fedora-Cloud-Base-Generic-44-1.7.aarch64.qcow2
          inventory: tests/inventory/fedora-44-aarch64
          boot:
            <<: *boot-no-secure-boot
          virt-customize: *systemd-device-timeout
    Fedora 43:
      osinfo:
        fedora42:
        generic:
          boot:
            hd:
              secure-boot-check: secure-boot=missing
            '':
              secure-boot-check: secure-boot=missing
            uefi:
              secure-boot-check: secure-boot=no
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
              secure-boot-check: secure-boot=no
      arch:
        x86_64:
          disk-url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2
          inventory: tests/inventory/fedora-43-x86_64
          runs-on:
            ubuntu-26.04:
            ubuntu-26.04-arm:
              virt-customize: *systemd-device-timeout
        aarch64:
          disk-url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/aarch64/images/Fedora-Cloud-Base-Generic-43-1.6.aarch64.qcow2
          inventory: tests/inventory/fedora-43-aarch64
          boot:
            <<: *boot-no-secure-boot
          virt-customize: *systemd-device-timeout
      vsock-ssh-test: no
    Ubuntu 26.04:
      osinfo: ubuntu24.04
      arch:
        x86_64:
          disk-url:
            https://cloud-images.ubuntu.com/releases/resolute/release-20260421/ubuntu-26.04-server-cloudimg-amd64v3.vmdk :
            https://cloud-images.ubuntu.com/releases/resolute/release-20260421/ubuntu-26.04-server-cloudimg-amd64v3.img :
            https://cloud-images.ubuntu.com/releases/resolute/release-20260421/ubuntu-26.04-server-cloudimg-amd64.vmdk :
            https://cloud-images.ubuntu.com/releases/resolute/release-20260421/ubuntu-26.04-server-cloudimg-amd64.img :
          inventory: tests/inventory/ubuntu-26.04-amd64
          runs-on:
            ubuntu-26.04:
            ubuntu-26.04-arm:
              virt-customize: *systemd-device-timeout
        aarch64:
          disk-url: https://cloud-images.ubuntu.com/releases/resolute/release-20260421/ubuntu-26.04-server-cloudimg-arm64.img
          inventory: tests/inventory/ubuntu-26.04-arm64
          boot: &boot-hd-also-secure-boot
            uefi:
              secure-boot-check: secure-boot=yes
            hd:
              secure-boot-check: secure-boot=yes
            '':
              secure-boot-check: secure-boot=yes
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=yes:
              secure-boot-check: secure-boot=yes
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
              secure-boot-check: secure-boot=no
          virt-customize: *systemd-device-timeout
    Debian 13:
      osinfo: debian13
      arch:
        x86_64:
          disk-url: https://cloud.debian.org/images/cloud/trixie/20260518-2482/debian-13-genericcloud-amd64-20260518-2482.qcow2
          inventory: tests/inventory/debian-13-amd64
          boot:
            uefi:
              secure-boot-check: secure-boot=yes
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=yes:
              secure-boot-check: secure-boot=yes
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
              secure-boot-check: secure-boot=no
        aarch64:
          disk-url: https://cloud.debian.org/images/cloud/trixie/20260518-2482/debian-13-genericcloud-arm64-20260518-2482.qcow2
          inventory: tests/inventory/debian-13-arm64
          boot:
            <<: *boot-hd-also-secure-boot
      vsock-ssh-test: no
    Arch Linux latest:
      osinfo: archlinux
      arch: x86_64
      disk-url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
      inventory: tests/inventory/arch-linux-latest-x86_64
      virt-customize: >
        --mkdir /etc/systemd/system/serial-getty@.service.d
        --copy-in tests/after-sshd.conf:/etc/systemd/system/serial-getty@.service.d
    Alpine Linux 3.23:
      osinfo: alpinelinux3.21
      arch:
        x86_64:
          disk-url: https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-x86_64-uefi-cloudinit-r0.qcow2
          inventory: tests/inventory/alpine-linux-3.23-x86_64
        aarch64:
          disk-url: https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-aarch64-uefi-cloudinit-r0.qcow2
          inventory: tests/inventory/alpine-linux-3.23-aarch64
      boot:
        <<: *boot-no-secure-boot
      virt-customize: >
        --edit '/etc/shadow:s/^root:!\*:/root:*:/'
      vsock-ssh-test: no
    openSUSE Tumbleweed:
      osinfo: opensusetumbleweed
      arch:
        x86_64:
          disk-url: https://download.opensuse.org/tumbleweed/appliances/openSUSE-Tumbleweed-Minimal-VM.x86_64-Cloud.qcow2
          inventory: tests/inventory/opensuse-tumbleweed
          boot:
            uefi:
              secure-boot-check: secure-boot=yes
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=yes:
              secure-boot-check: secure-boot=yes
            uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
              secure-boot-check: secure-boot=no
        aarch64:
          disk-url: https://download.opensuse.org/ports/aarch64/tumbleweed/appliances/openSUSE-Tumbleweed-Minimal-VM.aarch64-Cloud.qcow2
          inventory: tests/inventory/opensuse-tumbleweed
          boot:
            <<: *boot-hd-also-secure-boot
      virt-customize: >
        --edit '/boot/grub2/grub.cfg:s/quiet //'
      vsock-ssh-test: no
    OpenWrt 25.12:
      arch: x86_64
      disk-url: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-25.12.2-x86-64-generic-ext4-combined-efi.img.gz
      inventory: tests/inventory/openwrt-25.12-x86_64
      network: ./tests/network-192-168-1.xml
      virt-customize: >
        --edit '/etc/rc.local:s%^exit 0%ping -c1 192.168.1.254\necho "Booted, ready for login:" > /dev/console%'
      boot:
        hd:
          secure-boot-check: secure-boot=missing
        '':
          secure-boot-check: secure-boot=missing
        uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
          secure-boot-check: secure-boot=no
      second-machine:
        recreate:
        local-file:
      virtiofs-test: no
      vsock-ssh-test: no

  osinfo: linux2024

  boot:
    uefi:
      secure-boot-check: secure-boot=yes
    hd:
      secure-boot-check: secure-boot=missing
    '':
      secure-boot-check: secure-boot=missing
    uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=yes:
      secure-boot-check: secure-boot=yes
    uefi,firmware.feature0.name=secure-boot,firmware.feature0.enabled=no:
      secure-boot-check: secure-boot=no

  network:
    - bridge=virbr0,model=virtio
    - ./tests/network-192-168-1.xml

  second-machine:
    - recreate
    - local-file
    - multihost

  args:
    - >
      --memorybacking access.mode=shared
      --filesystem source=/etc,target=host-dir,driver.type=virtiofs
      --vsock cid.auto=yes
  virtiofs-test: test
  vsock-ssh-test: test

  exclude:
    - disk-url: https://fastly.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
      secure-boot-check: secure-boot=yes
    - disk-url: https://repo.almalinux.org/almalinux/10.2/cloud/x86_64/images/AlmaLinux-10-GenericCloud-10.2-20260526.0.x86_64.qcow2
      runs-on: ubuntu-26.04-arm
    - disk-url: https://cloud-images.ubuntu.com/releases/resolute/release-20260421/ubuntu-26.04-server-cloudimg-amd64v3.vmdk
      runs-on: ubuntu-26.04-arm
    - disk-url: https://cloud-images.ubuntu.com/releases/resolute/release-20260421/ubuntu-26.04-server-cloudimg-amd64v3.img
      runs-on: ubuntu-26.04-arm

